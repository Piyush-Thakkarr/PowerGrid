version: "3.8"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: powergrid-db
    environment:
      POSTGRES_USER: powergrid
      POSTGRES_PASSWORD: powergrid123
      POSTGRES_DB: powergrid
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powergrid -d powergrid"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: powergrid-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@powergrid.in
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
